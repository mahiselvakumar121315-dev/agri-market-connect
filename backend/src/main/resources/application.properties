# ========================================================
# AGRI MARKET CONNECT — REAL MYSQL DATABASE CONFIGURATION
# ========================================================

server.port=8080
spring.application.name=agri-market-connect

# Real Local MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/agri_market_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Mahi@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Schema & Data Script Execution
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# JWT Configuration
app.jwt.secret=AgriMarketConnectSuperSecretKeyForJWTAuth2026ProductionSignature987654321
app.jwt.expiration-ms=86400000

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
