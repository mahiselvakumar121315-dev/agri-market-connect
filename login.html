<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Agri Market Connect</title>
    <meta name="description" content="Login to Agri Market Connect — India's premier digital agricultural marketplace for Farmers, Buyers and Admins.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #15803d;
            --primary-light: #22c55e;
            --primary-dark: #166534;
            --primary-glow: rgba(22,163,74,0.15);
            --bg: #f3f4f6;
            --text-main: #1f2937;
            --text-sec: #4b5563;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 16px;
        }

        /* ── Real Image Background ── */
        .bg-container {
            position: fixed; inset: 0; z-index: 0;
            background-image: url('login_bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .bg-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: brightness(0.98);
        }

        /* Sparkles & Leaf overlay effects */
        .sparkle-overlay {
            position: absolute; inset: 0; pointer-events: none;
            background-image: radial-gradient(circle at 15% 25%, rgba(255,255,255,0.25) 1px, transparent 1px),
                              radial-gradient(circle at 80% 20%, rgba(255,255,255,0.3) 1.5px, transparent 1.5px),
                              radial-gradient(circle at 45% 70%, rgba(255,255,255,0.15) 2px, transparent 2px);
            background-size: 100px 100px;
            opacity: 0.75;
        }

        /* ── Main Form Wrap ── */
        .page-wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: slideUp 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo & Header ── */
        .brand-logo-container {
            width: 90px; height: 90px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(21,128,61,0.2), inset 0 -4px 10px rgba(0,0,0,0.05);
            margin-bottom: 12px;
            border: 2px solid rgba(255,255,255,0.8);
        }
        .brand-logo-img {
            width: 80px; height: 80px;
        }

        .app-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.1rem;
            font-weight: 800;
            color: #14532d;
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
            margin-bottom: 6px;
        }
        .tagline {
            font-size: 0.72rem;
            font-weight: 600;
            color: #14532d;
            text-align: center;
            margin-bottom: 8px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }
        .leaf-divider {
            color: #22c55e;
            font-size: 0.9rem;
            margin-bottom: 4px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 4px;
        }
        .developer-badge {
            font-size: 0.75rem;
            color: #1f2937;
            background: rgba(255,255,255,0.85);
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            backdrop-filter: blur(4px);
            font-weight: 600;
        }
        .developer-badge strong {
            color: #166534;
            font-weight: 800;
        }

        /* ── Glass Login Card ── */
        .login-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 30px 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 45px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.95);
        }

        /* Welcome text */
        .welcome-section {
            text-align: center;
            margin-bottom: 18px;
        }
        .welcome-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #15803d;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .welcome-subtitle {
            font-size: 0.78rem;
            color: #4b5563;
            font-weight: 600;
        }

        /* Role Selector grid */
        .roles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 18px;
        }
        .role-btn {
            background: #ffffff;
            border: 1.5px solid #e5e7eb;
            border-radius: 16px;
            padding: 12px 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
            outline: none;
        }
        .role-avatar {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .role-name {
            font-size: 0.8rem;
            font-weight: 700;
            color: #4b5563;
        }

        /* Radio Circle Indicator */
        .radio-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
            transition: all 0.2s;
        }
        .radio-indicator::after {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: transparent;
            display: block;
        }

        /* Active Farmer Role State */
        .role-btn[data-role="farmer"].active {
            border-color: #22c55e;
            background: #f0fdf4;
            box-shadow: 0 4px 12px rgba(34,197,94,0.1);
        }
        .role-btn[data-role="farmer"].active .role-name {
            color: #15803d;
        }
        .role-btn[data-role="farmer"].active .radio-indicator {
            border-color: #22c55e;
        }
        .role-btn[data-role="farmer"].active .radio-indicator::after {
            background: #22c55e;
        }

        /* Active Buyer Role State */
        .role-btn[data-role="buyer"].active {
            border-color: #0ea5e9;
            background: #f0f9ff;
            box-shadow: 0 4px 12px rgba(14,165,233,0.1);
        }
        .role-btn[data-role="buyer"].active .role-name {
            color: #0369a1;
        }
        .role-btn[data-role="buyer"].active .radio-indicator {
            border-color: #0ea5e9;
        }
        .role-btn[data-role="buyer"].active .radio-indicator::after {
            background: #0ea5e9;
        }

        /* Active Admin Role State */
        .role-btn[data-role="admin"].active {
            border-color: #7c3aed;
            background: #faf5ff;
            box-shadow: 0 4px 12px rgba(124,58,237,0.1);
        }
        .role-btn[data-role="admin"].active .role-name {
            color: #6d28d9;
        }
        .role-btn[data-role="admin"].active .radio-indicator {
            border-color: #7c3aed;
        }
        .role-btn[data-role="admin"].active .radio-indicator::after {
            background: #7c3aed;
        }

        /* ── Input Fields ── */
        .field-group {
            margin-bottom: 12px;
        }
        .input-wrap {
            position: relative;
        }
        .field-input {
            width: 100%;
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            padding: 12px 14px 12px 42px;
            font-size: 0.88rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .field-input::placeholder {
            color: var(--text-muted);
        }
        .field-input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* Icons inside Inputs */
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #15803d;
            font-size: 1rem;
            pointer-events: none;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-sec);
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0;
            outline: none;
        }

        /* Forgot Password link */
        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
            margin-bottom: 16px;
        }
        .forgot-link {
            font-size: 0.78rem;
            font-weight: 700;
            color: #15803d;
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-link:hover {
            color: var(--primary-light);
        }

        /* ── Submit Button ── */
        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #15803d, #16a34a);
            border: none;
            border-radius: 18px;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(21,128,61,0.22);
            letter-spacing: 0.2px;
            position: relative;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(21,128,61,0.3);
            background: linear-gradient(135deg, #166534, #15803d);
        }
        .login-btn:active {
            transform: translateY(0);
        }

        /* Sparkle Icon */
        .sparkle-icon {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
        }

        /* ── OR Divider ── */
        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
        }
        .or-line {
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        .or-text {
            font-size: 0.72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── Social Login ── */
        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .social-btn {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 11px 8px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #374151;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .social-btn:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }
        .google-icon {
            width: 16px;
            height: 16px;
        }
        .aadhaar-fingerprint {
            width: 16px;
            height: 16px;
            background-image: url('https://img.icons8.com/color/48/fingerprint.png');
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* ── Bottom Register row ── */
        .register-row {
            text-align: center;
            font-size: 0.82rem;
            color: #374151;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .register-link {
            color: #15803d;
            font-weight: 700;
            text-decoration: none;
        }
        .register-link:hover {
            text-decoration: underline;
        }

        /* ── Custom Modal ── */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px); z-index: 100;
            display: none; align-items: center; justify-content: center;
            padding: 16px;
        }
        .modal-backdrop.open { display: flex; }
        .modal-card {
            background: white; border-radius: 24px; padding: 22px;
            width: 100%; max-width: 340px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: popup 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popup { from{transform:scale(0.9);opacity:0;} to{transform:scale(1);opacity:1;} }
        .modal-title { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 800; color: #15803d; margin-bottom: 6px; text-align: center; }
        .modal-subtitle { font-size: 0.75rem; color: #6b7280; text-align: center; margin-bottom: 18px; line-height: 1.4; }
        
        .otp-inputs { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; }
        .otp-box {
            width: 42px; height: 42px; border: 1px solid #d1d5db; border-radius: 10px;
            text-align: center; font-size: 1.2rem; font-weight: 700; color: #111827;
            outline: none; transition: border-color 0.2s;
        }
        .otp-box:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
        
        /* ── Toasts ── */
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            background: white; border: 1px solid #e5e7eb; border-left: 4px solid #16a34a;
            border-radius: 12px; padding: 12px 18px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); font-size: 0.8rem; font-weight: 600; color: #374151;
            animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .toast.error { border-left-color: #ef4444; }
        @keyframes toastIn { from{transform:translateY(20px);opacity:0;} to{transform:translateY(0);opacity:1;} }
    </style>
</head>
<body>

<!-- Real Background Field -->
<div class="bg-container">
    <div class="bg-overlay"></div>
    <div class="sparkle-overlay"></div>
</div>

<!-- Page Contents Wrap -->
<div class="page-wrap">

    <!-- Circle Logo -->
    <div class="brand-logo-container">
        <svg class="brand-logo-img" viewBox="0 0 100 100">
            <!-- Sun -->
            <circle cx="65" cy="40" r="14" fill="#fbbf24"/>
            <!-- Hills -->
            <path d="M15,80 Q35,60 55,80" fill="#15803d"/>
            <path d="M40,80 Q65,55 90,80" fill="#16a34a"/>
            <!-- Plant -->
            <path d="M50,75 L50,45" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
            <path d="M50,55 Q35,50 35,42 Q45,42 50,55" fill="#22c55e"/>
            <path d="M50,50 Q65,45 65,37 Q55,37 50,50" fill="#22c55e"/>
            <path d="M50,45 Q40,35 50,28 Q60,35 50,45" fill="#4ade80"/>
        </svg>
    </div>

    <!-- Headings -->
    <h1 class="app-title">Agri Market Connect</h1>
    <p class="tagline">Connecting Farmers. Empowering Agriculture. Growing Together.</p>
    <div class="leaf-divider">🍃</div>
    <div class="developer-badge">Developed By <strong>S.Mahendran</strong></div>

    <!-- Login Container Card -->
    <div class="login-card">
        
        <!-- Welcome Title -->
        <div class="welcome-section">
            <h2 class="welcome-title">✨ Welcome!</h2>
            <p class="welcome-subtitle">Please choose your role to continue</p>
        </div>

        <!-- Role Select Grid -->
        <div class="roles-grid">
            
            <!-- Farmer -->
            <button class="role-btn active" data-role="farmer" onclick="selectRole(this)">
                <div class="role-avatar">
                    <svg viewBox="0 0 64 64" width="48" height="48">
                        <circle cx="32" cy="32" r="30" fill="#e8f5e9"/>
                        <!-- Head -->
                        <circle cx="32" cy="26" r="8.5" fill="#ffb74d"/>
                        <circle cx="29.5" cy="25" r="1" fill="#212121"/>
                        <circle cx="34.5" cy="25" r="1" fill="#212121"/>
                        <!-- Turban -->
                        <path d="M22,22 Q32,13 42,22" fill="#2e7d32"/>
                        <path d="M21,24 Q32,16 43,24" fill="#1b5e20"/>
                        <circle cx="32" cy="18" r="3.5" fill="#f57c00"/>
                        <!-- Mustache -->
                        <path d="M27.5,29.5 Q32,32 36.5,29.5" stroke="#212121" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <!-- Shirt -->
                        <path d="M16,48 Q32,38 48,48 Z" fill="#1b5e20"/>
                        <path d="M28,38 L36,38 L32,43 Z" fill="#ffb74d"/>
                        <!-- Plant -->
                        <path d="M20,46 L20,38" stroke="#f57c00" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M20,38 Q15,35 20,35 Q25,35 20,38" fill="#4caf50"/>
                    </svg>
                </div>
                <span class="role-name">Farmer</span>
                <div class="radio-indicator"></div>
            </button>

            <!-- Buyer -->
            <button class="role-btn" data-role="buyer" onclick="selectRole(this)">
                <div class="role-avatar">
                    <svg viewBox="0 0 64 64" width="48" height="48">
                        <circle cx="32" cy="32" r="30" fill="#e0f2fe"/>
                        <!-- Wheels -->
                        <circle cx="27" cy="45" r="3.5" fill="#0284c7"/>
                        <circle cx="41" cy="45" r="3.5" fill="#0284c7"/>
                        <!-- Cart Body -->
                        <path d="M18,22 H23 L27,38 H43 L47,26 H24" fill="none" stroke="#0284c7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- Sprout -->
                        <path d="M35,26 V18" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M35,21 Q30,19 35,19 Q40,19 35,21" fill="#22c55e"/>
                    </svg>
                </div>
                <span class="role-name">Buyer</span>
                <div class="radio-indicator"></div>
            </button>

            <!-- Admin -->
            <button class="role-btn" data-role="admin" onclick="selectRole(this)">
                <div class="role-avatar">
                    <svg viewBox="0 0 64 64" width="48" height="48">
                        <circle cx="32" cy="32" r="30" fill="#faf5ff"/>
                        <!-- Shield -->
                        <path d="M21,21 L32,15 L43,21 V35 C43,45 32,49 32,49 C32,49 21,45 21,35 Z" fill="#818cf8" stroke="#4f46e5" stroke-width="2.5" stroke-linejoin="round"/>
                        <!-- User icon -->
                        <circle cx="32" cy="27" r="4.5" fill="#ffffff"/>
                        <path d="M26,38 Q32,32 38,38 Z" fill="#ffffff"/>
                    </svg>
                </div>
                <span class="role-name">Admin</span>
                <div class="radio-indicator"></div>
            </button>

        </div>

        <!-- Form fields -->
        <form id="login-form" onsubmit="handleLogin(event)">
            
            <div class="field-group">
                <div class="input-wrap">
                    <i class="fa-solid fa-phone input-icon"></i>
                    <input id="mobile-input" type="text" class="field-input" placeholder="Mobile Number / Email" autocomplete="username" required>
                </div>
            </div>

            <div class="field-group">
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input id="password-input" type="password" class="field-input" placeholder="Password" autocomplete="current-password" required style="padding-right:44px;">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fa-regular fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Forgot Password Row -->
            <div class="forgot-row">
                <a href="#" class="forgot-link" onclick="openOtpModal(event)">Forgot Password?</a>
            </div>

            <!-- Login Securely Button -->
            <button type="submit" class="login-btn" id="login-btn">
                <i class="fa-solid fa-lock"></i>
                <span id="btn-text">Login Securely</span>
                <span class="sparkle-icon">✦</span>
            </button>

        </form>

        <!-- OR Divider -->
        <div class="or-divider">
            <div class="or-line"></div>
            <div class="or-text">OR</div>
            <div class="or-line"></div>
        </div>

        <!-- Social login buttons -->
        <div class="social-row">
            <button class="social-btn" onclick="googleLogin()">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
            <button class="social-btn" onclick="aadhaarLogin()">
                <div class="aadhaar-fingerprint"></div>
                Aadhaar Login
            </button>
        </div>

        <!-- Register Link -->
        <div class="register-row">
            🌱 Don’t have an account? <a href="#" class="register-link" onclick="goRegister(event)">Register Now</a>
        </div>

    </div>
</div>

<!-- OTP Modal -->
<div class="modal-backdrop" id="otp-modal">
    <div class="modal-card">
        <h3 class="modal-title">🔐 Reset Password</h3>
        <p class="modal-subtitle" id="otp-status-msg">Enter registered mobile to receive confirmation code</p>
        
        <div id="otp-step-1">
            <div class="field-group" style="margin-bottom: 12px;">
                <input id="reset-phone" type="text" class="field-input" placeholder="Mobile Number" style="padding-left:16px;">
            </div>
            <button class="login-btn" onclick="sendOtp()">Send Verification Code</button>
        </div>

        <div id="otp-step-2" style="display:none;">
            <div class="otp-inputs">
                <input class="otp-box" maxlength="1" oninput="focusNext(this, 0)">
                <input class="otp-box" maxlength="1" oninput="focusNext(this, 1)">
                <input class="otp-box" maxlength="1" oninput="focusNext(this, 2)">
                <input class="otp-box" maxlength="1" oninput="focusNext(this, 3)">
            </div>
            <button class="login-btn" onclick="verifyOtp()">Confirm OTP</button>
        </div>

        <button onclick="closeOtpModal()" style="display:block;width:100%;margin-top:12px;background:none;border:none;color:var(--text-muted);font-size:0.75rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;">Cancel</button>
    </div>
</div>

<!-- Toast element -->
<div class="toast-container" id="toast-container"></div>

<script>
    let currentRole = 'farmer';

    function selectRole(btn) {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRole = btn.dataset.role;

        const loginBtn = document.getElementById('login-btn');
        if (currentRole === 'admin') {
            loginBtn.style.background = 'linear-gradient(135deg, #7c3aed, #9333ea)';
            loginBtn.style.boxShadow = '0 4px 15px rgba(124,58,237,0.3)';
        } else if (currentRole === 'buyer') {
            loginBtn.style.background = 'linear-gradient(135deg, #0ea5e9, #0284c7)';
            loginBtn.style.boxShadow = '0 4px 15px rgba(14,165,233,0.3)';
        } else {
            loginBtn.style.background = 'linear-gradient(135deg, #15803d, #16a34a)';
            loginBtn.style.boxShadow = '0 4px 15px rgba(21,128,61,0.3)';
        }
    }

    function togglePassword() {
        const input = document.getElementById('password-input');
        const icon = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fa-regular fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fa-regular fa-eye';
        }
    }

    function handleLogin(e) {
        e.preventDefault();
        const mobile = document.getElementById('mobile-input').value.trim();
        const password = document.getElementById('password-input').value;
        const btnText = document.getElementById('btn-text');
        
        btnText.textContent = 'Verifying...';

        setTimeout(() => {
            btnText.textContent = 'Login Securely';
            
            // Set session storage role and user
            sessionStorage.setItem('agri_role', currentRole);
            sessionStorage.setItem('agri_user', mobile);
            
            showToast('✅ Login Successful! Opening Workspace...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);
        }, 1200);
    }

    function googleLogin() {
        showToast('🔄 Redirecting to Google Login...');
        sessionStorage.setItem('agri_role', currentRole);
        sessionStorage.setItem('agri_user', 'google.user@agrimarket.com');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    }

    function aadhaarLogin() {
        showToast('📲 Initializing Aadhaar Verification...');
        openOtpModal({ preventDefault: () => {} });
    }

    function goRegister(e) {
        e.preventDefault();
        showToast('🔄 Redirecting to Registration Form...');
        sessionStorage.setItem('agri_role', currentRole);
        sessionStorage.setItem('agri_user', 'new.registration@agri.com');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    }

    // OTP Modal helpers
    function openOtpModal(e) {
        e.preventDefault();
        document.getElementById('otp-modal').classList.add('open');
    }
    function closeOtpModal() {
        document.getElementById('otp-modal').classList.remove('open');
        document.getElementById('otp-step-1').style.display = 'block';
        document.getElementById('otp-step-2').style.display = 'none';
        document.getElementById('otp-status-msg').textContent = 'Enter registered mobile to receive confirmation code';
    }
    function sendOtp() {
        const ph = document.getElementById('reset-phone').value.trim();
        if (!ph) { showToast('⚠️ Please enter mobile number.', 'error'); return; }
        showToast('📱 Verification Code Sent!');
        document.getElementById('otp-step-1').style.display = 'none';
        document.getElementById('otp-step-2').style.display = 'block';
        document.getElementById('otp-status-msg').textContent = 'Enter the 4-digit code sent to your mobile';
        document.querySelectorAll('.otp-box')[0].focus();
    }
    function focusNext(input, idx) {
        if (input.value.length === 1 && idx < 3) {
            document.querySelectorAll('.otp-box')[idx + 1].focus();
        }
    }
    function verifyOtp() {
        showToast('✅ Verification Successful!');
        sessionStorage.setItem('agri_role', currentRole);
        sessionStorage.setItem('agri_user', 'verified.user@agri.com');
        setTimeout(() => {
            closeOtpModal();
            window.location.href = 'index.html';
        }, 1000);
    }

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast${type === 'error' ? ' error' : ''}`;
        toast.innerHTML = `<span style="color:#1f2937">${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'toastIn 0.3s reverse forwards';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    // Dismiss on click outside modal
    document.getElementById('otp-modal').addEventListener('click', function(e) {
        if (e.target === this) closeOtpModal();
    });
</script>

</body>
</html>
